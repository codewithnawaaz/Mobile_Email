<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Thank You Popup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex items-center justify-center">

<h1 class="text-2xl font-bold">Dashboard</h1>

<!-- Popup -->
<div id="popup" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white rounded-xl shadow-lg p-6 max-w-md text-center">

<h2 class="text-xl font-bold text-green-600 mb-3">
Thank You
</h2>

<p class="text-gray-700 mb-2">
Thank you for your cooperation. All mobile numbers and email addresses have been received.
</p>

<p class="text-gray-700 text-right" dir="rtl">
شكراً لتعاونكم. تم استلام جميع أرقام الجوال والبريد الإلكتروني.
</p>

<button onclick="closePopup()" class="mt-4 px-5 py-2 bg-green-600 text-white rounded-lg">
OK
</button>

</div>
</div>

<script>

// Page load hote hi popup show hoga
window.onload = function() {
document.getElementById("popup").style.display = "flex";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
