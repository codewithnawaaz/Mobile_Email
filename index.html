<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Worker Contact Update</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div id="formCard" class="bg-white shadow-xl rounded-xl p-6 w-full max-w-md transition">

<h2 class="text-2xl font-bold text-center mb-6">
Worker Contact Update
</h2>

<label class="text-sm font-semibold">Iqama Number</label>

<input id="iqama"
type="number"
placeholder="Enter Iqama"
class="w-full border rounded-lg p-2 mt-1 mb-3">

<button onclick="searchWorker()"
class="w-full bg-blue-600 text-white py-2 rounded-lg flex items-center justify-center gap-2">

<span id="searchText">Search</span>

<div id="searchSpinner"
class="h-5 w-5 border-2 border-white border-t-transparent rounded-full animate-spin hidden"></div>

</button>

<div id="resultBox" class="hidden mt-6">

<div class="mb-3">

<label class="text-gray-500 text-sm">Name</label>

<div id="name" class="font-semibold"></div>

</div>

<div class="mb-3">

<label class="text-gray-500 text-sm">Position</label>

<div id="position" class="font-semibold"></div>

</div>

<div id="warning"
class="text-red-600 text-sm mb-3 hidden"></div>

<label class="text-sm font-semibold">Mobile</label>

<input id="mobile"
placeholder="05xxxxxxxx"
class="w-full border rounded-lg p-2 mb-3">

<label class="text-sm font-semibold">Email</label>

<input id="email"
type="email"
placeholder="example@gmail.com"
class="w-full border rounded-lg p-2 mb-4">

<button id="submitBtn"
onclick="submitForm()"
class="w-full bg-green-600 text-white py-2 rounded-lg flex items-center justify-center gap-2">

<span id="submitText">Submit</span>

<div id="submitSpinner"
class="h-5 w-5 border-2 border-white border-t-transparent rounded-full animate-spin hidden"></div>

</button>

</div>

</div>

<div id="successPopup"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl text-center shadow-xl">

<h3 class="text-green-600 text-xl font-bold mb-2">
Success
</h3>

<p>Your contact details submitted successfully</p>

<button onclick="closePopup()"
class="mt-4 bg-green-600 text-white px-4 py-2 rounded-lg">
OK </button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxp-Ls_P69qN2bx2L8fiFuxtSnhbVybkD-lyk7tv72_GM3cSlNNejCb5o1E1gu3oaBOIQ/exec";

let worker=null;


function setLoading(state){

const card=document.getElementById("formCard");

if(state){

card.style.opacity="0.5";
card.style.pointerEvents="none";

}else{

card.style.opacity="1";
card.style.pointerEvents="auto";

}

}


async function searchWorker(){

const iqama=document.getElementById("iqama").value.trim();

if(!iqama){

alert("Enter Iqama");

return;

}

document.getElementById("searchSpinner").classList.remove("hidden");

setLoading(true);

const res=await fetch(API);

const data=await res.json();

document.getElementById("searchSpinner").classList.add("hidden");

setLoading(false);

const found=data.find(w=>w.Iqama==iqama);

if(found){

worker=found;

document.getElementById("resultBox").classList.remove("hidden");

document.getElementById("name").innerText=found.Name;

document.getElementById("position").innerText=found.Position;

document.getElementById("mobile").value=found.Mobile||"";

document.getElementById("email").value=found.Email||"";

if(found.Mobile||found.Email){

document.getElementById("warning").innerText=
"You already submitted. Contact your Timekeeper.";

document.getElementById("warning").classList.remove("hidden");

document.getElementById("submitBtn").disabled=true;

}else{

document.getElementById("warning").classList.add("hidden");

document.getElementById("submitBtn").disabled=false;

}

}else{

alert("Worker not found");

}

}



async function submitForm(){

if(!worker){

alert("Search worker first");

return;

}

const mobile=document.getElementById("mobile").value.trim();

const email=document.getElementById("email").value.trim();


const mobileRegex=/^0\d{9}$/;

if(!mobileRegex.test(mobile)){

alert("Mobile must start with 0 and be 10 digits");

return;

}


const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){

alert("Enter valid email address");

return;

}


const formData=new URLSearchParams();

formData.append("Iqama",worker.Iqama);

formData.append("Mobile",mobile);

formData.append("Email",email);


document.getElementById("submitSpinner").classList.remove("hidden");

setLoading(true);

const res=await fetch(API,{
method:"POST",
body:formData
});

const result=await res.json();

document.getElementById("submitSpinner").classList.add("hidden");

setLoading(false);


if(result.result==="success"){

document.getElementById("successPopup").classList.remove("hidden");

resetForm();

}else{

alert("You already submitted. Contact Timekeeper.");

}

}



function resetForm(){

document.getElementById("iqama").value="";

document.getElementById("mobile").value="";

document.getElementById("email").value="";

document.getElementById("resultBox").classList.add("hidden");

worker=null;

}


function closePopup(){

document.getElementById("successPopup").classList.add("hidden");

}

</script>

</body>

</html>
